<!DOCTYPE html>
<html>
<head>
    <title>Add Drink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f6f9;
        }
        .wrap {
            max-width: 520px;
            margin: 60px auto;
        }
        .cardx {
            background: white;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            padding: 24px;
        }
        .header {
            background: #0d6efd;
            color: white;
            padding: 14px 18px;
            border-radius: 14px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 18px;
        }
        .btn-gold {
            background: #d4af37;
            color: white;
            border: none;
        }
        .btn-gold:hover {
            background: #c49b2c;
            color: white;
        }
    </style>
</head>
<body>

<div class="container wrap">
    <div class="header">Add Drink</div>

    <div class="cardx">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Drink Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Price (Ksh)</label>
                <input type="number" name="price" step="0.01" min="0" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>
                <select name="category" class="form-select" required>
                    <option value="">-- Select Category --</option>
                    <option value="Beer">Beer</option>
                    <option value="Spirit">Spirit</option>
                    <option value="Soft Drink">Soft Drink</option>
                    <option value="Food">Food</option>
                    <option value="Special">Special</option>
                    <option value="Water">Water</option>
                </select>
            </div>

            <button type="submit" class="btn btn-gold w-100">Add Drink</button>
        </form>

        <a href="/admin" class="btn btn-secondary w-100 mt-3">Back</a>
    </div>
</div>

</body>
</html>
