<!DOCTYPE html>
<html>
<head>
    <title>Unlock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background:#0d1b2a;
            color:white;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .box {
            width: 320px;
            background:#1b263b;
            border-radius:16px;
            padding:24px;
            box-shadow:0 8px 24px rgba(0,0,0,0.25);
        }
    </style>
</head>
<body>
<div class="box">
    <h4 class="text-center mb-3">🔒 Locked</h4>
    <p class="text-center mb-3">{{ username }}</p>
    <form method="POST">
        <input type="password" name="pin" class="form-control mb-3" placeholder="Enter PIN" required>
        <button class="btn btn-success w-100">Unlock</button>
    </form>
</div>
</body>
</html>
