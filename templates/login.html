<!DOCTYPE html>
<html>
<head>
    <title>Golden Hearts POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background:#0d1b2a;
            color:white;
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .login-box {
            background:#1b263b;
            padding:40px;
            border-radius:12px;
            width:300px;
            box-shadow:0 8px 20px rgba(0,0,0,0.3);
        }

        .btn-gold {
            background:#ffd700;
            color:black;
            border:none;
        }
    </style>
</head>

<body>

<div class="login-box text-center">

    <h3 class="text-warning mb-3">Golden Hearts POS</h3>
    <p class="mb-4">Enter your PIN</p>

    <form method="POST">
        <input type="password" name="pin" class="form-control mb-3" placeholder="PIN" required>
        <button type="submit" class="btn btn-gold w-100">Login</button>
    </form>

</div>

</body>
</html>
