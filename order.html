<!DOCTYPE html>
<html>
<head>
    <title>Order Drinks</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">
        <h3>Room {{ room_id }} - Order Drinks</h3>

        <!-- ADD DRINK -->
        <form method="POST" class="row g-3">

            <div class="col-md-5">
                <label>Select Drink</label>
                <select name="drink" class="form-control" required>
                    <option value="">-- Select Drink --</option>

                    {% for d in drinks %}
                        <option value="{{ d[0] }}">
                            {{ d[1] }} - Ksh {{ d[3] }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-3">
                <label>Quantity</label>
                <input type="number" name="qty" class="form-control" min="1" required>
            </div>

            <div class="col-md-2">
                <label>&nbsp;</label>
                <button class="btn btn-success w-100">Add</button>
            </div>

        </form>
    </div>

    <!-- CURRENT ORDERS -->
    <div class="card mt-4">
        <h4>Current Orders</h4>

        <table class="table table-bordered">
            <tr>
                <th>Drink</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Total</th>
            </tr>

            {% for item in items %}
            <tr>
                <td>{{ item[0] }}</td>
                <td>{{ item[1] }}</td>
                <td>{{ item[2] }}</td>
                <td>{{ item[1] * item[2] }}</td>
            </tr>
            {% endfor %}

        </table>
    </div>

    <div class="mt-3">
        <a href="/bill/{{ room_id }}" class="btn btn-primary">View Bill</a>
        <a href="/dashboard" class="btn btn-secondary">Back</a>
    </div>

</div>

</body>
</html>
